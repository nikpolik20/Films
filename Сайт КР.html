<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Кино | Каталог российских фильмов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0A0C10 0%, #141824 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, 'Roboto', sans-serif;
            color: #EDEDED;
            line-height: 1.5;
            padding: 32px 24px 60px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Шапка */
        .hero {
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #FFFFFF 0%, #FF8C5A 50%, #FF4D4D 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .hero-sub {
            color: #9CA3AF;
            font-size: 1rem;
            margin-bottom: 24px;
        }

        /* Панель фильтров (поиск + жанр + год) */
        .filters-panel {
            background: rgba(18, 21, 30, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .search-row {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #12151E;
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .search-row:focus-within {
            border-color: #FF4D4D;
            box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.2);
        }
        .search-icon {
            color: #9CA3AF;
            font-size: 1.2rem;
        }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            color: #EDEDED;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }
        .search-input::placeholder {
            color: #6A6F86;
        }
        .search-clear {
            background: none;
            border: none;
            color: #9CA3AF;
            cursor: pointer;
            padding: 0 12px;
            font-size: 1.2rem;
            transition: color 0.2s;
        }
        .search-clear:hover {
            color: #FF4D4D;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 140px;
        }
        .filter-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #FF8C5A;
            margin-bottom: 6px;
        }
        .genre-select, .year-input {
            width: 100%;
            background: #12151E;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 10px 16px;
            color: #EDEDED;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }
        .year-input {
            cursor: text;
        }
        .reset-filters-btn {
            background: rgba(255, 77, 77, 0.2);
            border: 1px solid rgba(255, 77, 77, 0.4);
            padding: 10px 20px;
            border-radius: 40px;
            color: #FF8C5A;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .reset-filters-btn:hover {
            background: rgba(255, 77, 77, 0.4);
            border-color: #FF4D4D;
        }

        /* Информация о результатах */
        .search-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 12px;
        }
        .results-count {
            color: #9CA3AF;
            font-size: 0.9rem;
        }

        /* Сетка карточек */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 32px 24px;
            margin-top: 8px;
        }

        /* Карточка фильма */
        .movie-card {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-radius: 24px;
            background: #12151E;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #FF4D4D, #FF8C5A, #FFB347);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .movie-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 77, 77, 0.4);
            box-shadow: 0 28px 45px -12px rgba(0, 0, 0, 0.6);
        }
        .movie-card:hover::before {
            opacity: 1;
        }
        .poster-img {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            background: linear-gradient(135deg, #1A1D29 0%, #0F121B 100%);
            transition: transform 0.3s;
        }
        .movie-card:hover .poster-img {
            transform: scale(1.02);
        }
        .card-info {
            padding: 18px 16px 22px;
            background: linear-gradient(0deg, #12151E 0%, #0F121B 100%);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #F3F4F6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #BBBFD0;
            margin-top: 8px;
        }
        .rating-star {
            background: linear-gradient(135deg, #FF4D4D20, #FF8C5A10);
            padding: 4px 10px;
            border-radius: 50px;
            font-weight: 600;
            color: #FFB347;
        }
        .year-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-content {
            background: linear-gradient(135deg, #0F121B 0%, #0A0C10 100%);
            max-width: 880px;
            width: 100%;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 77, 77, 0.4);
            animation: modalFadeIn 0.3s ease-out;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-poster {
            flex: 1.2;
            min-width: 200px;
            background: linear-gradient(135deg, #0A0C10, #12151E);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
        }
        .modal-poster img {
            width: 100%;
            max-width: 280px;
            border-radius: 24px;
            box-shadow: 0 25px 40px -12px black;
            border: 2px solid rgba(255, 77, 77, 0.5);
        }
        .modal-info {
            flex: 2;
            padding: 32px 36px 36px;
            color: #F0F2F8;
        }
        .modal-info h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FFFFFF, #FF8C5A);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .modal-details {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            margin: 24px 0 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 0;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #FF8C5A;
            font-weight: 600;
        }
        .detail-value {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .genre-chip {
            background: linear-gradient(135deg, #FF4D4D20, #FF8C5A10);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.85rem;
            color: #FFB67E;
            display: inline-block;
        }
        .plot-text {
            margin: 20px 0 16px;
            line-height: 1.6;
            color: #BCBFD4;
            font-size: 0.95rem;
        }
        .actor-list {
            font-size: 0.85rem;
            color: #C7CBE2;
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-radius: 20px;
        }
        .close-modal {
            background: linear-gradient(135deg, #FF4D4D, #ff3355);
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 32px;
            margin-top: 28px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            width: 100%;
        }
        .close-modal:hover {
            background: linear-gradient(135deg, #ff6b2c, #ff4d4d);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 77, 77, 0.3);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #9CA3AF;
        }
        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #FF8C5A;
        }

        footer {
            margin-top: 70px;
            text-align: center;
            font-size: 0.85rem;
            color: #6A6F86;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 28px;
        }

        @media (max-width: 680px) {
            body { padding: 20px 16px; }
            .hero h1 { font-size: 2.2rem; }
            .filters-panel { padding: 16px; }
            .search-row { flex-wrap: wrap; border-radius: 40px; padding: 8px 12px; }
            .filter-row { flex-direction: column; align-items: stretch; }
            .reset-filters-btn { width: 100%; text-align: center; }
            .modal-content { flex-direction: column; max-height: 90vh; overflow-y: auto; }
            .modal-info h2 { font-size: 1.6rem; }
            .modal-info { padding: 24px; }
        }
    </style>
</head>

    <div class="search-info" id="searchInfo">

    <!-- Сетка карточек -->
    <div class="movies-grid" id="moviesGrid"></div>

</div>

<div id="movieModal" class="modal">

        // ---------- Вспомогательные функции ----------
        // Извлечение уникальных жанров из всех фильмов (нормализация: разбиваем по разделителям)
        function extractUniqueGenres() {
            const genresSet = new Set();
            filmsCatalog.forEach(film => {
                // Разделители: запятая, слэш, " · " (пробел-средняя точка-пробел)
                let parts = film.genre.split(/[\/,·]+/).map(s => s.trim().toLowerCase());
                parts.forEach(part => {
                    if (part) genresSet.add(part);
                });
            });
            return Array.from(genresSet).sort();
        }

        // Заполнение select жанров
        function populateGenreSelect() {
            const genreSelect = document.getElementById('genreFilter');
            const genres = extractUniqueGenres();
            genreSelect.innerHTML = '<option value="all">Все жанры</option>';
            genres.forEach(genre => {
                const option = document.createElement('option');
                option.value = genre;
                option.textContent = genre.charAt(0).toUpperCase() + genre.slice(1);
                genreSelect.appendChild(option);
            });
        }

        // Проверка, соответствует ли фильм выбранному жанру
        function matchesGenre(film, selectedGenre) {
            if (selectedGenre === 'all') return true;
            const filmGenres = film.genre.toLowerCase().split(/[\/,·]+/).map(s => s.trim());
            return filmGenres.includes(selectedGenre);
        }

        // Проверка соответствия году
        function matchesYear(film, yearFrom, yearTo) {
            if (yearFrom !== '' && film.year < parseInt(yearFrom)) return false;
            if (yearTo !== '' && film.year > parseInt(yearTo)) return false;
            return true;
        }

        // Проверка текстового поиска (название, жанр, актёры, год)
        function matchesTextSearch(film, query) {
            if (!query.trim()) return true;
            const lowerQuery = query.toLowerCase().trim();
            return film.title.toLowerCase().includes(lowerQuery) ||
                   film.genre.toLowerCase().includes(lowerQuery) ||
                   film.actors.toLowerCase().includes(lowerQuery) ||
                   film.year.toString().includes(lowerQuery);
        }

        // Глобальные переменные состояния
        let currentTextQuery = '';
        let currentGenre = 'all';
        let currentYearFrom = '';
        let currentYearTo = '';

        // DOM элементы
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const genreFilter = document.getElementById('genreFilter');
        const yearFromInput = document.getElementById('yearFrom');
        const yearToInput = document.getElementById('yearTo');
        const resetAllBtn = document.getElementById('resetAllFiltersBtn');
        const resultsCountSpan = document.getElementById('resultsCount');
        const moviesGrid = document.getElementById('moviesGrid');
        const modal = document.getElementById('movieModal');
        const modalContent = document.getElementById('modalContent');

        // Заглушка для битых изображений
        const getFallbackImg = (title) => `https://via.placeholder.com/300x450?text=${encodeURIComponent(title)}`;

        // Основная функция фильтрации и рендеринга
        function renderMovies() {
            // Фильтруем каталог
            const filtered = filmsCatalog.filter(film => {
                return matchesTextSearch(film, currentTextQuery) &&
                       matchesGenre(film, currentGenre) &&
                       matchesYear(film, currentYearFrom, currentYearTo);
            });

            // Обновляем счётчик
            resultsCountSpan.textContent = `Найдено фильмов: ${filtered.length} из ${filmsCatalog.length}`;

            // Рендер сетки
            if (filtered.length === 0) {
                moviesGrid.innerHTML = `<div class="no-results"><h3>🎬 Ничего не найдено</h3><p>Попробуйте изменить параметры поиска или фильтры</p></div>`;
            } else {
                moviesGrid.innerHTML = filtered.map(film => {
                    // Обрезаем слишком длинный жанр для карточки
                    const shortGenre = film.genre.length > 28 ? film.genre.slice(0, 28) + '…' : film.genre;
                    return `
                        <div class="movie-card" data-id="${film.id}">
                            <img class="poster-img" src="${film.poster}" alt="${film.title}" loading="lazy" onerror="this.src='${getFallbackImg(film.title)}'">
                            <div class="card-info">
                                <div class="card-title">${film.title}</div>
                                <div class="card-meta">
                                    <span class="year-badge">${film.year}</span>
                                    <span class="rating-star">★ ${film.rating}</span>
                                </div>
                                <div class="card-meta" style="margin-top: 6px;">
                                    <span style="font-size:0.7rem; color:#FF9F6E;">${shortGenre}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Привязать обработчики клика к карточкам
            document.querySelectorAll('.movie-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    openModal(id);
                });
            });
        }

        // Обновление всех фильтров из UI
        function updateFiltersAndRender() {
            currentTextQuery = searchInput.value;
            currentGenre = genreFilter.value;
            currentYearFrom = yearFromInput.value;
            currentYearTo = yearToInput.value;
            renderMovies();
        }

        // Сброс всех фильтров
        function resetAllFilters() {
            searchInput.value = '';
            genreFilter.value = 'all';
            yearFromInput.value = '';
            yearToInput.value = '';
            updateFiltersAndRender();
        }

        // Очистка только поискового поля (крестик)
        function clearSearchOnly() {
            searchInput.value = '';
            updateFiltersAndRender();
        }

        // Модальное окно
        function openModal(filmId) {
            const film = filmsCatalog.find(f => f.id === filmId);
            if (!film) return;
            modalContent.innerHTML = `
                <div class="modal-poster">
                    <img src="${film.poster}" alt="${film.title}" onerror="this.src='${getFallbackImg(film.title)}'">
                </div>
                <div class="modal-info">
                    <h2>${film.title}</h2>
                    <div class="modal-details">
                        <div class="detail-item">
                            <div class="detail-label">Год выпуска</div>
                            <div class="detail-value">${film.year}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Рейтинг</div>
                            <div class="detail-value">⭐ ${film.rating} / 10</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Жанр</div>
                            <div class="genre-chip">${film.genre}</div>
                        </div>
                    </div>
                    <div class="plot-text"><strong>📖 О фильме:</strong><br> ${film.fullDesc}</div>
                    <div class="actor-list"><span style="font-weight:600;">🎭 В главных ролях:</span> ${film.actors}</div>
                    <button class="close-modal" id="closeModalBtn">Закрыть</button>
                </div>
            `;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Закрытие по клику на фон и Escape
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.style.display === 'flex') closeModal();
        });

        // Инициализация: заполняем список жанров, навешиваем события
        populateGenreSelect();
        
        // События (все фильтры обновляют рендер)
        searchInput.addEventListener('input', updateFiltersAndRender);
        searchClear.addEventListener('click', clearSearchOnly);
        genreFilter.addEventListener('change', updateFiltersAndRender);
        yearFromInput.addEventListener('input', updateFiltersAndRender);
        yearToInput.addEventListener('input', updateFiltersAndRender);
        resetAllBtn.addEventListener('click', resetAllFilters);

        // Первый рендер
        updateFiltersAndRender();
    })();
</script>
